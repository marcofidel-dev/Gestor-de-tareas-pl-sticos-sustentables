spring.application.name=gestor-tareas
server.port=8080

# --- Conexion a MySQL 8 (servidor independiente, servicio MySQL80, puerto 3306) ---
# Usuario dedicado 'gestor' con acceso solo a la BD 'gestion_tareas' (no se usa root).
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_tareas?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=gestor
spring.datasource.password=Gestor2026
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
# El esquema lo administran las migraciones de Flyway (src/main/resources/db/migration).
# 'validate': Hibernate solo verifica que las tablas/columnas coincidan con las entidades, no las modifica.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

# --- Flyway (migraciones) ---
# Habilitado por defecto al tener flyway-core en el classpath; busca los scripts en classpath:db/migration.
spring.flyway.enabled=true

# --- JWT ---
# Clave para firmar los tokens (HS256, minimo 32 bytes). En produccion: externalizar y rotar.
app.jwt.secret=clave-secreta-desarrollo-gestor-tareas-cambiar-en-produccion-2026
# Vigencia del token en milisegundos (86400000 = 24 horas).
app.jwt.expiration-ms=86400000
